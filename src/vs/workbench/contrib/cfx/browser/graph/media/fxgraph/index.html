<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'none'; style-src 'unsafe-inline' vscode-resource: ${cspSource}; script-src vscode-resource: ${cspSource} 'unsafe-eval'; img-src vscode-resource: ${cspSource} data:; font-src vscode-resource: ${cspSource}; connect-src ${cspSource};" />
	<title>Cfx fxgraph</title>
	<style>
		html, body, #cfx-fxgraph-root {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			background: var(--vscode-editor-background, #1e1e1e);
			color: var(--vscode-editor-foreground, #d4d4d4);
			font-family: var(--vscode-font-family);
			overflow: hidden;
		}

		.cfx-fxgraph-loading {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100%;
			text-align: center;
			padding: 20px;
		}

		.cfx-fxgraph-loading-inner {
			max-width: 600px;
		}

		.cfx-fxgraph-loading h2 {
			margin: 0 0 8px;
			font-weight: 400;
			color: var(--vscode-foreground);
		}

		.cfx-fxgraph-loading p {
			opacity: 0.7;
			line-height: 1.5;
		}

		.cfx-fxgraph-loading code {
			background: var(--vscode-textBlockQuote-background, #00000033);
			padding: 1px 4px;
			border-radius: 2px;
			font-family: var(--vscode-editor-font-family, monospace);
		}
	</style>
</head>
<body>
	<div id="cfx-fxgraph-root">
		<div class="cfx-fxgraph-loading">
			<div class="cfx-fxgraph-loading-inner">
				<h2>Cfx Visual Graph Editor</h2>
				<p>The React-Flow visual editor bundle has not been built yet.</p>
				<p>Run <code>node ide/build/build-fxgraph-webview.mjs</code> from the ide/ folder, then reload this editor (or restart Cfx Studio).</p>
				<p>Until then, use <strong>Cfx: Open .fxgraph As Text</strong> from the command palette to edit the JSON directly.</p>
			</div>
		</div>
	</div>
	<script>
		// Once the React-Flow bundle is built (patch 0028), <script> /
		// <link> tags here load it. The bundle reads `acquireVsCodeApi()`
		// to get a postMessage handle and exchanges init/change messages
		// with the host (see common/fxgraphMessages.ts).
		(function () {
			const vscode = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;
			if (vscode) {
				vscode.postMessage({ type: 'ready' });
			}
		})();
	</script>
</body>
</html>
